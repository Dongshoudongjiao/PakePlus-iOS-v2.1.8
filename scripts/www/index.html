<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>俄语助手 · 北极熊版 · 支持Excel导入</title>
  <!-- Tailwind + Font Awesome 6 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Chart.js 轻量图表 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- SheetJS 用于解析 Excel -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    /* 沉浸式极光背景 - 无白边 */
    body {
      background: radial-gradient(circle at 30% 30%, #b8e1ff, #a0d0ff, #7bb3ff);
      background-attachment: fixed;
      margin: 0;
      padding: 0;
      font-family: 'Nunito', 'Segoe UI', Roboto, system-ui, sans-serif;
    }
    .dark body {
      background: radial-gradient(circle at 30% 30%, #1a2639, #0f172a, #0b0f1a);
    }
    /* 毛玻璃卡片 */
    .glass-nin {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 2.5rem;
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.2) inset;
    }
    .dark .glass-nin {
      background: rgba(15, 23, 42, 0.75);
      border-color: rgba(255,255,255,0.08);
    }
    /* 卡片悬浮弹跳 */
    .card-nin {
      transition: all 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    }
    .card-nin:hover {
      transform: scale(1.02) translateY(-6px);
      box-shadow: 0 25px 40px -12px rgba(0, 100, 255, 0.4);
    }
    /* 按钮按压反馈 */
    .btn-nin {
      transition: transform 0.08s, box-shadow 0.2s;
    }
    .btn-nin:active {
      transform: scale(0.96);
      box-shadow: 0 5px 10px -5px rgba(0,0,0,0.2);
    }
    /* 自定义模态框 - 毛玻璃弹窗 */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .modal-content {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(20px);
      border-radius: 48px;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      border: 2px solid white;
      box-shadow: 0 30px 50px -20px rgba(0,0,0,0.3);
      transform: scale(0.9);
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-overlay.active .modal-content {
      transform: scale(1);
    }
    /* 北极熊眨眼动画 */
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }
    .polar-bear-eye {
      animation: blink 4s infinite;
    }
    /* 耳抖动 */
    @keyframes earWiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-8deg); }
      75% { transform: rotate(4deg); }
    }
    .bear-ear:hover {
      animation: earWiggle 0.3s;
    }
    /* 动态噪点背景 */
    .noise-bg::after {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.04"/></svg>');
      pointer-events: none;
      z-index: 9998;
    }
    /* 翻转卡片 */
    .flip-container { perspective: 1000px; width: 100%; min-height: 240px; cursor: pointer; }
    .flip-card {
      width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d;
    }
    .flip-card.flipped { transform: rotateY(180deg); }
    .flip-front, .flip-back {
      width: 100%; min-height: 240px; backface-visibility: hidden;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      border-radius: 2rem; padding: 1.8rem; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .dark .flip-front, .dark .flip-back { background: #1e293b; color: #f1f5f9; }
    .flip-back { transform: rotateY(180deg); background: #eef6ff; }
    .dark .flip-back { background: #1a2e4a; }
    .star-filled { color: #facc15; }
    .star-empty { color: #cbd5e1; }
  </style>
</head>
<body class="antialiased noise-bg">
  <!-- 自定义模态框（全局单例） -->
  <div id="customModal" class="modal-overlay">
    <div class="modal-content">
      <div id="modalIcon" class="text-5xl text-center mb-4">🐻❄️</div>
      <h3 id="modalTitle" class="text-2xl font-bold text-center mb-2">提示</h3>
      <p id="modalMessage" class="text-center text-slate-700 dark:text-slate-200 mb-6 whitespace-pre-line"></p>
      <div class="flex gap-3 justify-center">
        <button id="modalConfirmBtn" class="btn-nin px-8 py-3 bg-gradient-to-r from-blue-500 to-indigo-600 text-white rounded-full font-bold shadow-lg hover:shadow-xl">确定</button>
        <button id="modalCancelBtn" class="btn-nin px-8 py-3 bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-slate-200 rounded-full font-bold">取消</button>
      </div>
    </div>
  </div>

  <div id="app" class="relative min-h-screen">
    <!-- ========== 导航栏 - 不再固定，随页面滚动 ========== -->
    <nav class="glass-nin mx-4 mt-4 mb-2 px-6 py-3 flex justify-between items-center">
      <h1 class="text-3xl font-black bg-gradient-to-r from-blue-700 to-cyan-600 bg-clip-text text-transparent drop-shadow-md">
        <i class="fas fa-language mr-2 text-blue-500"></i>俄语助手
      </h1>
      <div class="flex items-center gap-3">
        <!-- 北极熊吉祥物 -->
        <div id="polarBear" class="relative flex items-center cursor-pointer group" onclick="app.bearSay()">
          <div class="relative w-12 h-12 bg-white rounded-full shadow-md flex items-center justify-center border-2 border-white/80">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <circle cx="24" cy="24" r="20" fill="white" stroke="#D9D0C0" stroke-width="1.5"/>
              <circle cx="12" cy="12" r="7" fill="white" stroke="#D9D0C0" stroke-width="1.5" class="bear-ear"/>
              <circle cx="12" cy="12" r="4" fill="#E5DCCF"/>
              <circle cx="36" cy="12" r="7" fill="white" stroke="#D9D0C0" stroke-width="1.5" class="bear-ear"/>
              <circle cx="36" cy="12" r="4" fill="#E5DCCF"/>
              <circle cx="16" cy="22" r="3" fill="#1E3A5F" class="polar-bear-eye"/>
              <circle cx="32" cy="22" r="3" fill="#1E3A5F" class="polar-bear-eye"/>
              <ellipse cx="24" cy="28" rx="4" ry="3" fill="#4A5C6E"/>
              <path d="M18 34 Q24 40, 30 34" stroke="#4A5C6E" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
          </div>
          <div id="bearBubble" class="absolute -top-10 left-1/2 -translate-x-1/2 bg-white text-blue-800 px-4 py-2 rounded-full shadow-lg text-sm font-bold whitespace-nowrap opacity-0 transition-opacity pointer-events-none">
            Привет!
          </div>
        </div>
        <!-- 导航按钮 -->
        <button onclick="app.switchPage('home')" class="nav-btn text-xl p-2 rounded-full hover:bg-white/30 dark:hover:bg-slate-700/50 transition"><i class="fas fa-home"></i></button>
        <button onclick="app.switchPage('add')" class="nav-btn text-xl p-2 rounded-full hover:bg-white/30 dark:hover:bg-slate-700/50"><i class="fas fa-plus-circle"></i></button>
        <button onclick="app.switchPage('list')" class="nav-btn text-xl p-2 rounded-full hover:bg-white/30 dark:hover:bg-slate-700/50"><i class="fas fa-book"></i></button>
        <button onclick="app.switchPage('stats')" class="nav-btn text-xl p-2 rounded-full hover:bg-white/30 dark:hover:bg-slate-700/50"><i class="fas fa-chart-simple"></i></button>
        <button onclick="app.switchPage('quiz')" class="nav-btn text-xl p-2 rounded-full hover:bg-white/30 dark:hover:bg-slate-700/50"><i class="fas fa-puzzle-piece"></i></button>
        <button onclick="app.toggleDarkMode()" class="text-xl p-2 rounded-full hover:bg-white/30 dark:hover:bg-slate-700/50">
          <i id="darkIcon" class="fas fa-moon"></i>
        </button>
      </div>
    </nav>

    <!-- ========== 主页面容器 - 顶部留白减少 ========== -->
    <div id="page-container" class="pt-2 pb-12 px-4 max-w-7xl mx-auto"></div>
  </div>

  <script>
    (function(){
      "use strict";

      /********** 柔和音效模块 **********/
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      let audioCtx = null;
      function playSound(type) {
        try {
          if (!audioCtx) audioCtx = new AudioContext();
          if (audioCtx.state === 'suspended') audioCtx.resume();
          const osc = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          osc.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          
          switch(type) {
            case 'success': osc.frequency.value = 440; gainNode.gain.value = 0.08; osc.type = 'sine'; break;
            case 'error': osc.frequency.value = 220; gainNode.gain.value = 0.06; osc.type = 'sine'; break;
            case 'delete': osc.frequency.value = 180; gainNode.gain.value = 0.06; osc.type = 'sine'; break;
            case 'complete': osc.frequency.value = 660; gainNode.gain.value = 0.1; osc.type = 'sine'; break;
            default: osc.frequency.value = 440; gainNode.gain.value = 0.08; osc.type = 'sine';
          }
          osc.start();
          osc.stop(audioCtx.currentTime + 0.12);
        } catch(e) { /* 静默 */ }
      }
      function vibrate(pattern = 20) {
        if (window.navigator && window.navigator.vibrate) {
          window.navigator.vibrate(pattern);
        }
      }

      /********** 数据模型 **********/
      const STORAGE_KEY = 'russian_polarbear_excel';
      let words = [];
      let settings = { darkMode: false, dailyGoal: 15 };
      let studyQueue = [], studyIndex = 0;
      let quizQuestions = [], quizScore = 0;
      let charts = {};

      // 加载数据
      function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          try { const d = JSON.parse(stored); words = d.words || []; settings = { ...settings, ...d.settings }; } catch(e){}
        }
        if (!words.length) {
          words = [
            { id: Date.now()+1, ru: 'Привет', zh: '你好', pos: '名词', proficiency: 3, reviewCount: 5, lastReview: null, added: new Date().toISOString(), example: 'Привет, как дела?', note: '' },
            { id: Date.now()+2, ru: 'Спасибо', zh: '谢谢', pos: '名词', proficiency: 4, reviewCount: 4, lastReview: null, added: new Date().toISOString(), example: 'Большое спасибо!', note: '' },
            { id: Date.now()+3, ru: 'Как дела', zh: '你好吗', pos: '短语', proficiency: 2, reviewCount: 2, lastReview: null, added: new Date().toISOString(), example: 'Привет, как дела?', note: '' },
            { id: Date.now()+4, ru: 'До свидания', zh: '再见', pos: '短语', proficiency: 3, reviewCount: 3, lastReview: null, added: new Date().toISOString(), example: 'До свидания!', note: '' },
            { id: Date.now()+5, ru: 'пожалуйста', zh: '请/不客气', pos: '副词', proficiency: 2, reviewCount: 2, lastReview: null, added: new Date().toISOString(), example: 'Спасибо! — Пожалуйста.', note: '' },
          ];
        }
        words.forEach(w => { w.proficiency ??= 0; w.reviewCount ??= 0; w.example ??= ''; w.note ??= ''; });
        applyDarkMode(settings.darkMode);
      }
      function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ words, settings }));
        updateStreak();
      }

      // 连续打卡
      function updateStreak() {
        const today = new Date().toISOString().split('T')[0];
        let last = localStorage.getItem('lastStudyDate') || '';
        let streak = parseInt(localStorage.getItem('studyStreak') || '0');
        if (last !== today) {
          if (last) {
            const lastDate = new Date(last);
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
            streak = (lastDate.toISOString().split('T')[0] === yesterday.toISOString().split('T')[0]) ? streak+1 : 1;
          } else streak = 1;
          localStorage.setItem('lastStudyDate', today);
          localStorage.setItem('studyStreak', streak);
          if (streak > parseInt(localStorage.getItem('maxStreak')||'0')) localStorage.setItem('maxStreak', streak);
        }
        return streak;
      }

      // 暗黑模式
      function applyDarkMode(isDark) {
        if (isDark) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
        const icon = document.getElementById('darkIcon');
        if (icon) icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
      }
      function toggleDarkMode() { settings.darkMode = !settings.darkMode; applyDarkMode(settings.darkMode); saveData(); }

      /********** 模态框系统（无原生弹窗） **********/
      const modal = {
        el: document.getElementById('customModal'),
        titleEl: document.getElementById('modalTitle'),
        msgEl: document.getElementById('modalMessage'),
        iconEl: document.getElementById('modalIcon'),
        confirmBtn: document.getElementById('modalConfirmBtn'),
        cancelBtn: document.getElementById('modalCancelBtn'),
        resolve: null,
        show({ title = '提示', message = '', icon = '🐻❄️', confirmText = '确定', cancelText = null, onConfirm, onCancel }) {
          this.titleEl.innerText = title;
          this.msgEl.innerText = message;
          this.iconEl.innerText = icon;
          this.confirmBtn.innerText = confirmText;
          this.cancelBtn.style.display = cancelText ? 'block' : 'none';
          if (cancelText) this.cancelBtn.innerText = cancelText;
          this.el.classList.add('active');
          return new Promise((resolve) => {
            this.resolve = resolve;
            const confirmHandler = () => { this.hide(); resolve(true); onConfirm?.(); playSound('success'); vibrate(20); };
            const cancelHandler = () => { this.hide(); resolve(false); onCancel?.(); };
            this.confirmBtn.onclick = confirmHandler;
            this.cancelBtn.onclick = cancelHandler;
            this.el.onclick = (e) => { if (e.target === this.el) { this.hide(); resolve(false); } };
          });
        },
        hide() { this.el.classList.remove('active'); }
      };

      /********** 北极熊互动 **********/
      function bearSay() {
        const bubble = document.getElementById('bearBubble');
        bubble.style.opacity = '1';
        playSound('success'); vibrate(20);
        setTimeout(() => { bubble.style.opacity = '0'; }, 2000);
      }

      /********** 页面调度 **********/
      const container = document.getElementById('page-container');
      function switchPage(page) {
        let html = '';
        if (page === 'home') html = renderHome();
        else if (page === 'add') html = renderAdd();
        else if (page === 'list') html = renderList();
        else if (page === 'stats') html = renderStats();
        else if (page === 'study') html = renderStudy();
        else if (page === 'quiz') html = renderQuiz();
        container.innerHTML = html;
        if (page === 'stats') setTimeout(initChart, 50);
        if (page === 'study') initStudy();
        if (page === 'quiz') initQuiz();
        if (page === 'list') initListEvents();
        if (page === 'add') initAddForm();
      }

      /********** 首页 **********/
      function renderHome() {
        const toReview = words.filter(w => needReview(w)).length;
        const todayNew = words.filter(w => w.added?.split('T')[0] === new Date().toISOString().split('T')[0]).length;
        const mastered = words.filter(w => w.proficiency >= 4).length;
        const masterRate = words.length ? ((mastered/words.length)*100).toFixed(0) : 0;
        const streak = updateStreak();
        const weak = words.filter(w => w.proficiency <= 1).slice(0,5);
        return `
          <div class="space-y-6">
            <div class="grid md:grid-cols-3 gap-6">
              <div class="glass-nin p-6 card-nin">
                <div class="flex items-center gap-4">
                  <div class="p-4 bg-blue-200/50 rounded-2xl"><i class="fas fa-calendar-check text-3xl text-blue-700"></i></div>
                  <div><p class="text-sm opacity-70">今日复习</p><p class="text-4xl font-black">${toReview}</p></div>
                </div>
                <div class="mt-4 flex justify-between text-sm"><span>今日新增: <span class="font-bold">${todayNew}</span></span><span>目标: ${settings.dailyGoal}</span></div>
                <button onclick="app.startStudy()" class="btn-nin mt-5 w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white py-3 rounded-2xl font-bold flex items-center justify-center gap-2"><i class="fas fa-play"></i>开始背诵</button>
              </div>
              <div class="glass-nin p-6 card-nin">
                <div class="flex items-center gap-4">
                  <div class="p-4 bg-green-200/50 rounded-2xl"><i class="fas fa-chart-line text-3xl text-green-700"></i></div>
                  <div><p class="text-sm opacity-70">掌握率</p><p class="text-4xl font-black">${masterRate}%</p></div>
                </div>
                <div class="mt-4 w-full h-3 bg-slate-300 rounded-full overflow-hidden"><div class="bg-green-500 h-3 rounded-full" style="width:${masterRate}%"></div></div>
                <p class="mt-4 text-sm">总词汇: <span class="font-bold">${words.length}</span> · 熟练: ${mastered}</p>
              </div>
              <div class="glass-nin p-6 card-nin">
                <div class="flex items-center gap-4">
                  <div class="p-4 bg-amber-200/50 rounded-2xl"><i class="fas fa-fire text-3xl text-amber-700"></i></div>
                  <div><p class="text-sm opacity-70">连续打卡</p><p class="text-4xl font-black">${streak}天</p></div>
                </div>
                <div class="mt-4 flex justify-between"><span class="text-sm">🔥 最高: ${localStorage.getItem('maxStreak')||streak}</span><span class="text-sm"><i class="fas fa-medal text-amber-500"></i> ${streak>=7?'周勇士':streak>=30?'月传奇':'坚持'}</span></div>
              </div>
            </div>
            <div class="glass-nin p-6">
              <h3 class="text-xl font-bold flex items-center gap-2 mb-4"><i class="fas fa-exclamation-triangle text-red-500"></i>需要加强</h3>
              ${weak.length ? weak.map(w => `<div class="flex justify-between items-center py-2 border-b border-white/20 last:border-0"><span><span class="font-bold">${w.ru}</span> <span class="text-sm opacity-70">${w.zh}</span></span><span class="px-3 py-1 bg-red-200/60 rounded-full text-xs">熟练度 ${w.proficiency}</span></div>`).join('') : '<p class="text-center py-4 opacity-70">暂无薄弱词🎉</p>'}
            </div>
          </div>
        `;
      }

      // 艾宾浩斯复习判定
      function needReview(w) {
        if (w.proficiency >= 5) return false;
        if (!w.lastReview) return true;
        const diff = Math.floor((new Date() - new Date(w.lastReview)) / (1000*60*60*24));
        if (w.proficiency <=1) return diff>=1;
        if (w.proficiency ===2) return diff>=2;
        if (w.proficiency ===3) return diff>=4;
        if (w.proficiency ===4) return diff>=7;
        return false;
      }

      /********** 添加单词 **********/
      function renderAdd() {
        return `
          <div class="glass-nin p-8 max-w-2xl mx-auto">
            <h2 class="text-3xl font-black mb-6 bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent"><i class="fas fa-plus-circle mr-2"></i>添加单词</h2>
            <form id="wordForm" class="space-y-5">
              <input type="hidden" id="editId">
              <div><label class="block font-medium mb-1">俄语 <span class="text-red-500">*</span></label><input type="text" id="ru" required placeholder="Привет" class="w-full px-5 py-4 rounded-2xl border-0 bg-white/70 dark:bg-slate-800/70 backdrop-blur-sm focus:ring-4 focus:ring-blue-300 outline-none"></div>
              <div><label class="block font-medium mb-1">中文 <span class="text-red-500">*</span></label><input type="text" id="zh" required placeholder="你好" class="w-full px-5 py-4 rounded-2xl border-0 bg-white/70 dark:bg-slate-800/70 focus:ring-4 focus:ring-blue-300"></div>
              <div class="grid grid-cols-2 gap-4">
                <div><label class="block font-medium mb-1">词性</label><input type="text" id="pos" placeholder="名词" class="w-full px-5 py-4 rounded-2xl border-0 bg-white/70 dark:bg-slate-800/70"></div>
                <div><label class="block font-medium mb-1">熟练度</label><select id="proficiency" class="w-full px-5 py-4 rounded-2xl border-0 bg-white/70 dark:bg-slate-800/70"><option value="0">0 - 不认识</option><option value="1">1 - 眼熟</option><option value="2">2 - 模糊</option><option value="3">3 - 记得</option><option value="4">4 - 熟练</option><option value="5">5 - 掌握</option></select></div>
              </div>
              <div><label class="block font-medium mb-1">例句</label><textarea id="example" rows="2" class="w-full px-5 py-4 rounded-2xl border-0 bg-white/70 dark:bg-slate-800/70"></textarea></div>
              <div><label class="block font-medium mb-1">备注</label><input type="text" id="note" class="w-full px-5 py-4 rounded-2xl border-0 bg-white/70 dark:bg-slate-800/70"></div>

          const w = words.find(w=>w.id==editId);
          if(w) {
            document.getElementById('ru').value = w.ru;
            document.getElementById('zh').value = w.zh;
            document.getElementById('pos').value = w.pos||'';
            document.getElementById('proficiency').value = w.proficiency||0;
            document.getElementById('example').value = w.example||'';
            document.getElementById('note').value = w.note||'';
          }
        }
        form.onsubmit = (e) => {
          e.preventDefault();
          const ru = document.getElementById('ru').value.trim();
          const zh = document.getElementById('zh').value.trim();
          if (!ru || !zh) return;
          const editId = document.getElementById('editId').value;
          if (editId) {
            const idx = words.findIndex(w=>w.id==editId);
            if (idx!==-1) words[idx] = {...words[idx], ru, zh, pos: document.getElementById('pos').value, proficiency: parseInt(document.getElementById('proficiency').value), example: document.getElementById('example').value, note: document.getElementById('note').value};
            playSound('success'); vibrate(20);
          } else {
            words.push({ id: Date.now(), ru, zh, pos: document.getElementById('pos').value||'其他', proficiency: parseInt(document.getElementById('proficiency').value)||0, reviewCount:0, lastReview:null, added: new Date().toISOString(), example: document.getElementById('example').value, note: document.getElementById('note').value });
            playSound('success'); vibrate(20);
          }
          saveData();
          document.getElementById('formMsg').innerText = '✅ 保存成功！';
          form.reset(); document.getElementById('editId').value = '';
          setTimeout(()=>{ document.getElementById('formMsg').innerText = ''; switchPage('list'); }, 1000);

      // 新版导入函数：支持 JSON 和 Excel
      function importWords(e) {
        const file = e.target.files[0];
        if (!file) return;

        const fileName = file.name;
        const fileExt = fileName.split('.').pop().toLowerCase();

        if (fileExt === 'json') {
          // JSON 导入
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              const imported = JSON.parse(ev.target.result);
              if (Array.isArray(imported)) {
                imported.forEach(item => {
                  const newWord = {
                    id: Date.now() + Math.floor(Math.random() * 1000),
                    ru: item.ru || '',
                    zh: item.zh || '',
                    pos: item.pos || '其他',
                    proficiency: item.proficiency || 0,
                    reviewCount: item.reviewCount || 0,
                    lastReview: item.lastReview || null,
                    added: new Date().toISOString(),
                    example: item.example || '',
                    note: item.note || ''
                  };
                  if (newWord.ru && newWord.zh) words.push(newWord);
                });
                saveData();
                modal.show({ title: '导入成功', message: `已导入 ${imported.length} 个单词`, icon: '📚', confirmText: '好的', cancelText: null });
                renderListView();
              }
            } catch(ex) {
              modal.show({ title: '错误', message: 'JSON 文件格式不正确', icon: '❌', confirmText: '确定', cancelText: null });
            }
          };
          reader.readAsText(file);
        } 
        else if (fileExt === 'xlsx' || fileExt === 'xls') {
          // Excel 导入
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              const data = new Uint8Array(ev.target.result);
              const workbook = XLSX.read(data, { type: 'array' });
              const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
              // 将 sheet 转为二维数组，第一行为标题，忽略
              const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });
              if (rows.length < 2) {
                modal.show({ title: '错误', message: 'Excel 文件至少需要一行标题和一行数据', icon: '❌', confirmText: '确定', cancelText: null });
                return;
              }
              const imported = [];
              for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                const ru = row[0] ? String(row[0]).trim() : '';
                const zh = row[1] ? String(row[1]).trim() : '';
                if (!ru || !zh) continue; // 跳过空行
                const pos = row[2] ? String(row[2]).trim() : '其他';
                imported.push({
                  ru, zh, pos,
                  proficiency: 0,
                  reviewCount: 0,
                  lastReview: null,
                  example: '',
                  note: ''
                });
              }
              if (imported.length === 0) {
                modal.show({ title: '错误', message: 'Excel 中没有有效数据（俄语、中文不能为空）', icon: '❌', confirmText: '确定', cancelText: null });
                return;
              }
              imported.forEach(item => {
                words.push({
                  id: Date.now() + Math.floor(Math.random() * 1000),
                  ...item,
                  added: new Date().toISOString()
                });
              });
              saveData();
              modal.show({ title: '导入成功', message: `从 Excel 导入 ${imported.length} 个单词`, icon: '📚', confirmText: '好的', cancelText: null });
              renderListView();
            } catch (ex) {
              console.error(ex);
              modal.show({ title: '错误', message: 'Excel 解析失败，请检查文件格式', icon: '❌', confirmText: '确定', cancelText: null });
            }
          };
          reader.readAsArrayBuffer(file);
        } 
        else {
          modal.show({ title: '错误', message: '不支持的文件类型，请上传 .json 或 .xlsx/.xls 文件', icon: '❌', confirmText: '确定', cancelText: null });
        }
      }

      function renderQuiz() {
        if (words.length < 4) return '<div class="glass-nin p-10 text-center">单词不足4个，无法测试</div>';
        quizQuestions = generateQuiz(5);
        quizScore = 0;
        return `
          <div class="glass-nin p-8 max-w-3xl mx-auto">
            <h2 class="text-3xl font-black mb-6 bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent"><i class="fas fa-puzzle-piece mr-2"></i>单词测验</h2>
            <div id="quizArea" class="space-y-6"></div>
          </div>
        `;

      function generateQuiz(count=5) {
        const shuffled = [...words].sort(()=>0.5-Math.random());
        const selected = shuffled.slice(0, count);
        return selected.map(w => {
          let options = [w.zh];
          const others = words.filter(x => x.id !== w.id).map(x => x.zh).filter((v,i,a)=>a.indexOf(v)===i);
          while (options.length < 4 && others.length) {
            const rand = others[Math.floor(Math.random() * others.length)];
            if (!options.includes(rand)) options.push(rand);
          }
          while (options.length < 4) options.push('???');
          options = options.sort(()=>0.5-Math.random());
          return { word: w, question: w.ru, correct: w.zh, options };
        });
      }
      function initQuiz() {
        if (!quizQuestions.length) return;
        const area = document.getElementById('quizArea');
        area.innerHTML = quizQuestions.map((q, idx) => `
          <div class="bg-white/70 dark:bg-slate-800/70 p-5 rounded-2xl quiz-item" data-correct="${q.correct}">
            <p class="text-lg font-bold mb-3">${idx+1}. ${q.question}</p>
            <div class="grid grid-cols-2 gap-3">
              ${q.options.map(opt => `<button class="quiz-opt w-full py-3 px-3 bg-slate-100 dark:bg-slate-700 rounded-xl hover:bg-blue-100 transition" data-opt="${opt}">${opt}</button>`).join('')}
            </div>
            <p class="quiz-feedback text-sm mt-2"></p>
          </div>
        `).join('');
        document.querySelectorAll('.quiz-opt').forEach(btn => {
          btn.addEventListener('click', function(e) {
            const item = this.closest('.quiz-item');
            const correct = item.dataset.correct;
            const selected = this.dataset.opt;
            const feedback = item.querySelector('.quiz-feedback');
            if (item.classList.contains('answered')) return;
            item.classList.add('answered');
            if (selected === correct) {
              feedback.innerHTML = '✅ 正确！'; feedback.classList.add('text-green-600');
              quizScore++; playSound('success'); vibrate(15);
            } else {
              feedback.innerHTML = `❌ 错误，正确答案：${correct}`; feedback.classList.add('text-red-600');
              playSound('error'); vibrate(20);
            }
            let scoreEl = document.getElementById('quizScore');
            if (!scoreEl) { scoreEl = document.createElement('div'); scoreEl.id = 'quizScore'; scoreEl.className = 'mt-6 text-center text-xl font-bold'; area.parentNode.appendChild(scoreEl); }
            scoreEl.innerText = `得分: ${quizScore}/${quizQuestions.length}`;
          });
        });
      }

      function setDailyGoal() {
        const newGoal = prompt('请输入每日学习目标（单词数）', settings.dailyGoal);
        if (newGoal && !isNaN(newGoal) && newGoal > 0) {
          settings.dailyGoal = parseInt(newGoal);
          saveData();
          playSound('success');
          vibrate(20);
          switchPage('stats');
        }
      }

      function resetFilters() {
        const si = document.getElementById('searchInput'); if(si) si.value = '';
        const fp = document.getElementById('filterProficiency'); if(fp) fp.value = 'all';
        const fpos = document.getElementById('filterPos'); if(fpos) fpos.value = 'all';
        renderListView();
      }

      // 暴露全局API
      window.app = {
        switchPage, toggleDarkMode, startStudy, speak, exportWords, importWords,
        deleteWord, editWord, showWordDetail, bearSay, setDailyGoal, resetFilters,
        renderListView, toggleFlip, answerStudy
      };

      // 启动
      loadData();
      switchPage('home');
    })();
  </script>
</body>
</html>
